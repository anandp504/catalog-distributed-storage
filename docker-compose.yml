version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      GITEA_NODES: "http://gitea-1:3000,http://gitea-2:3000"
      GITEA_ORG: "beckn"
      GITEA_ADMIN_USER: "${GITEA_ADMIN_USER:-gitea_admin}"
      GITEA_ADMIN_PASSWORD: "${GITEA_ADMIN_PASSWORD}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-beckn}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-catalog_routing}"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gitea-1:
        condition: service_healthy
      gitea-2:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-catalog_routing}"
      POSTGRES_USER: "${POSTGRES_USER:-beckn}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beckn -d catalog_routing"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gitea-1:
    image: gitea/gitea:1.22
    ports:
      - "3001:3000"
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__ROOT_URL: "http://gitea-1:3000"
      GITEA__server__OFFLINE_MODE: "true"
      GITEA__server__HTTP_PORT: "3000"
    volumes:
      - gitea-data-1:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/v1/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  gitea-2:
    image: gitea/gitea:1.22
    ports:
      - "3002:3000"
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__ROOT_URL: "http://gitea-2:3000"
      GITEA__server__OFFLINE_MODE: "true"
      GITEA__server__HTTP_PORT: "3000"
    volumes:
      - gitea-data-2:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/v1/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres-data:
  gitea-data-1:
  gitea-data-2:
